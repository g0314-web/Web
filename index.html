<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospedagem Rápida HTML</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen">

    <div id="builder-ui" class="max-w-4xl mx-auto p-6 mt-10">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-bold text-blue-600 mb-2">Hospede seu HTML</h1>
            <p class="text-gray-500">Cole seu código, escolha um nome e publique seu site na hora.</p>
        </header>

        <main class="bg-white p-8 rounded-lg shadow-md">
            <form id="publish-form" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nome do Site (URL)</label>
                    <div class="flex rounded-md shadow-sm">
                        <span class="inline-flex items-center px-3 rounded-l-md border border-r-0 border-gray-300 bg-gray-50 text-gray-500 sm:text-sm">
                            seusite.com/?site=
                        </span>
                        <input type="text" id="site-name" required pattern="[a-zA-Z0-9-]+" title="Apenas letras, números e traços" placeholder="meu-projeto" class="flex-1 min-w-0 block w-full px-3 py-2 rounded-none rounded-r-md border border-gray-300 focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                    </div>
                    <p class="mt-1 text-xs text-gray-500">Use apenas letras, números e traços. Sem espaços.</p>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Código HTML completo</label>
                    <textarea id="html-content" rows="12" required class="shadow-sm focus:ring-blue-500 focus:border-blue-500 block w-full sm:text-sm border border-gray-300 rounded-md p-3 font-mono text-sm bg-gray-900 text-green-400" placeholder="<!DOCTYPE html>&#10;<html>&#10;<body>&#10;  <h1>Olá Mundo!</h1>&#10;</body>&#10;</html>"></textarea>
                </div>

                <button type="submit" id="submit-btn" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors">
                    Publicar Site
                </button>
            </form>

            <div id="result-area" class="hidden mt-6 p-4 bg-green-50 border border-green-200 rounded-md text-center">
                <h3 class="text-green-800 font-medium text-lg">Site publicado com sucesso!</h3>
                <p class="text-green-700 mt-2">Acesse seu site pelo link abaixo:</p>
                <a id="result-link" href="#" target="_blank" class="block mt-3 text-blue-600 font-bold hover:underline break-all text-xl"></a>
            </div>

            <div id="error-area" class="hidden mt-6 p-4 bg-red-50 border border-red-200 rounded-md text-center">
                <p id="error-message" class="text-red-700 font-medium"></p>
            </div>
        </main>
    </div>

    <script>
        // --- 1. CONFIGURAÇÃO DO SUPABASE ---
        const SUPABASE_URL = 'https://ecqbpgonvxczedgswhfh.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_KHZzpDGgQNP7fzHuNZBwkw_cWY2umXP';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // --- 2. LÓGICA DE ROTEAMENTO (VERIFICAR A URL) ---
        const urlParams = new URLSearchParams(window.location.search);
        const requestedSite = urlParams.get('site');

        if (requestedSite) {
            // Modo Visualização: Esconde a interface e carrega o site do banco
            document.getElementById('builder-ui').style.display = 'none';
            loadSite(requestedSite);
        }

        async function loadSite(siteName) {
            const { data, error } = await supabase
                .from('hosted_sites')
                .select('html_content')
                .eq('site_name', siteName)
                .single();

            if (error || !data) {
                document.body.innerHTML = `
                    <div style="text-align: center; margin-top: 50px; font-family: sans-serif;">
                        <h1 style="color: #ef4444;">Erro 404</h1>
                        <p>O site "<strong>${siteName}</strong>" não foi encontrado ou não existe.</p>
                        <a href="${window.location.pathname}" style="color: #3b82f6; text-decoration: none;">Criar um site</a>
                    </div>`;
                return;
            }

            // Mágica acontece aqui: Substitui todo o documento atual pelo HTML salvo
            document.open();
            document.write(data.html_content);
            document.close();
        }

        // --- 3. LÓGICA DE PUBLICAÇÃO ---
        const form = document.getElementById('publish-form');
        const submitBtn = document.getElementById('submit-btn');
        const resultArea = document.getElementById('result-area');
        const resultLink = document.getElementById('result-link');
        const errorArea = document.getElementById('error-area');
        const errorMessage = document.getElementById('error-message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Reseta a interface
            submitBtn.textContent = 'Publicando...';
            submitBtn.disabled = true;
            resultArea.classList.add('hidden');
            errorArea.classList.add('hidden');

            const siteNameInput = document.getElementById('site-name').value.toLowerCase().trim();
            const htmlInput = document.getElementById('html-content').value;

            // Insere no banco
            const { data, error } = await supabase
                .from('hosted_sites')
                .insert([
                    { site_name: siteNameInput, html_content: htmlInput }
                ]);

            if (error) {
                errorArea.classList.remove('hidden');
                if (error.code === '23505') { // Código de erro SQL para Unique Violation
                    errorMessage.textContent = 'Este nome de site já está em uso. Por favor, escolha outro.';
                } else {
                    errorMessage.textContent = 'Ocorreu um erro ao salvar: ' + error.message;
                }
            } else {
                // Sucesso: Gera o link
                const currentUrl = window.location.href.split('?')[0]; // Pega a URL atual limpa
                const newSiteUrl = `${currentUrl}?site=${siteNameInput}`;
                
                resultLink.href = newSiteUrl;
                resultLink.textContent = newSiteUrl;
                resultArea.classList.remove('hidden');
                form.reset();
            }

            submitBtn.textContent = 'Publicar Site';
            submitBtn.disabled = false;
        });
    </script>
</body>
</html>
